<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analyst Authentication | CyberTrace</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
      .login-container {
        max-width: 440px;
        margin-top: 100px;
      }
    </style>
  </head>
  <body class="bg-dark text-light">
    <!-- Navbar -->
    <div id="cybertrace-navbar"></div>

    <div class="container d-flex justify-content-center">
      <div class="card-custom bg-dark border-secondary border-opacity-15 p-4 w-100 login-container">
        <div class="text-center mb-4">
          <i class="bi bi-shield-lock-fill text-info fs-1"></i>
          <h3 class="fw-bold text-white mt-2">Analyst Authentication</h3>
          <p class="text-secondary small">Provide cryptographic network keys or login credentials to proceed.</p>
        </div>

        <form id="login-form">
          <div class="mb-3">
            <label for="email" class="form-label small text-secondary">Registered Email Name</label>
            <input type="email" class="form-control bg-dark text-white border-secondary small" id="email" required placeholder="name@cybertrace.io">
          </div>

          <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
              <label for="password" class="form-label small text-secondary mb-1">Security PIN / Password</label>
            </div>
            <input type="password" class="form-control bg-dark text-white border-secondary small" id="password" required placeholder="••••••••••••">
          </div>

          <button type="submit" class="btn btn-primary-custom w-100 py-2.5 text-uppercase fw-bold font-mono small">
            <i class="bi bi-unlock-fill"></i> Decrypt & Authenticate
          </button>
        </form>

        <div class="text-center mt-3 small text-secondary">
          Not yet a registered analyst? <a href="register.html" class="text-info text-decoration-none">Create a Profile</a>
        </div>
      </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        renderNavbar();

        // Already logged in? redirect
        if (getUserFromToken()) {
          window.location.href = "dashboard.html";
        }

        const form = document.getElementById("login-form");
        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          try {
            const data = await apiRequest("auth/login", {
              method: "POST",
              body: JSON.stringify({ email, password })
            });

            // Store credentials & token
            saveToken(data.access_token, data.user);
            showToast("System decrypted. Analyst session registered!", "success");

            setTimeout(() => {
              window.location.href = "dashboard.html";
            }, 1000);
          } catch (err) {
            showToast(`Decryption Error: ${err.message}`, "danger");
          }
        });
      });
    </script>
  </body>
</html>
